name: Build Unsigned IPA
on: workflow_dispatch
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show environment
        run: |
          xcodebuild -version
          swift --version
          uname -m

      - name: Install XcodeGen (direct download, no brew)
        run: |
          set -e
          XCODEGEN_VERSION="2.45.4"
          echo "Installing XcodeGen $XCODEGEN_VERSION"
          curl -fsSL \
            "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip" \
            -o xcodegen.zip
          unzip -o xcodegen.zip
          sudo install -m 755 xcodegen/bin/xcodegen /usr/local/bin/xcodegen
          xcodegen --version

      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml
          ls -la
          xcodebuild -project Calculator.xcodeproj -list

      - name: Build unsigned app
        run: |
          set -o pipefail
          xcodebuild \
            -project Calculator.xcodeproj \
            -scheme Calculator \
            -sdk iphoneos \
            -configuration Release \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath build \
            2>&1 | tee xcodebuild.log

      - name: Show build log on failure
        if: failure()
        run: |
          echo "=== XCODEBUILD LOG (last 100 lines) ==="
          tail -100 xcodebuild.log || echo "(no log)"
          echo "=== Build products ==="
          find build -name "*.app" 2>/dev/null || echo "(none)"

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/Calculator.app Payload/
          zip -r Calculator.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: Calculator-ipa
          path: Calculator.ipa
